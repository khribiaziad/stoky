services:
  - type: web
    name: stoky
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt && cd frontend && npm install && npm run build && cp -r dist ../backend/dist"
    startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
