<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title id="page-title">Order Now</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #00d48f;
      --bg: #0f0f17;
      --card: #1a1a26;
      --border: #2a2a3a;
      --t1: #eeeef5;
      --t2: #9ca3af;
      --t3: #4b5563;
      --red: #ef4444;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--t1);
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 40px;
      text-align: center;
      background: radial-gradient(ellipse at top, #0d2a1e 0%, var(--bg) 60%);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0,212,143,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .store-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,212,143,0.1);
      border: 1px solid rgba(0,212,143,0.25);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 800;
      line-height: 1.15;
      max-width: 700px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #ffffff 0%, #a0f0d8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: clamp(14px, 2.5vw, 17px);
      color: var(--t2);
      max-width: 520px;
      margin-bottom: 36px;
    }

    .price-tag {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 28px;
      margin-bottom: 36px;
    }

    .price-amount {
      font-size: 36px;
      font-weight: 800;
      color: var(--accent);
    }

    .price-currency {
      font-size: 16px;
      font-weight: 600;
      color: var(--t2);
    }

    .price-delivery {
      font-size: 13px;
      color: var(--t3);
      margin-left: 4px;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px 36px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(0,212,143,0.3);
    }

    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,212,143,0.4);
    }

    .hero-cta:active { transform: scale(0.97); }

    .trust-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--t2);
    }

    .trust-icon {
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    /* ── PRODUCT IMAGE ── */
    .product-section {
      padding: 60px 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .product-image-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px;
    }

    .product-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--t3);
    }

    .product-placeholder svg { opacity: 0.3; }

    /* ── FEATURES ── */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 60px;
    }

    .feature-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .feature-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .feature-desc {
      font-size: 13px;
      color: var(--t2);
      line-height: 1.5;
    }

    /* ── ORDER FORM ── */
    .form-section {
      padding: 0 20px 80px;
      max-width: 560px;
      margin: 0 auto;
    }

    .form-section-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .form-section-sub {
      text-align: center;
      font-size: 14px;
      color: var(--t2);
      margin-bottom: 32px;
    }

    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--t2);
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      color: var(--t1);
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,143,0.1);
    }

    input::placeholder, textarea::placeholder { color: var(--t3); }

    .field { margin-bottom: 18px; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    .hp { display: none !important; }

    .items-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .items-header label { margin-bottom: 0; }

    .add-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .add-btn:hover { background: rgba(0,212,143,0.08); border-color: var(--accent); }

    .item-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .item-row input { flex: 1; }
    .item-row input[type=number] { width: 70px; flex: 0 0 70px; text-align: center; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--t3);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: var(--red); }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(0,212,143,0.25);
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    .result.success {
      display: block;
      background: rgba(0,212,143,0.1);
      border: 1px solid rgba(0,212,143,0.25);
      color: var(--accent);
    }

    .result.error {
      display: block;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: var(--red);
    }

    .wa-note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--t3);
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 12px;
      color: var(--t3);
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .order-card { padding: 20px 16px; }
      .row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<!-- ── HERO ── -->
<section class="hero">
  <div class="store-badge">
    <span id="store-badge-name">STORE</span>
  </div>

  <h1 id="hero-title">Product Name</h1>
  <p class="hero-desc" id="hero-desc">High quality product. Fast delivery across Morocco.</p>

  <div class="price-tag" id="price-tag" style="display:none">
    <span class="price-amount" id="price-amount">0</span>
    <span class="price-currency">MAD</span>
    <span class="price-delivery" id="delivery-note"></span>
  </div>

  <a href="#order" class="hero-cta">
    🛒 Order Now
  </a>

  <div class="trust-row">
    <span class="trust-item">
      <svg class="trust-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      Fast Delivery
    </span>
    <span class="trust-item">
      <svg class="trust-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      Secure Payment
    </span>
    <span class="trust-item">
      <svg class="trust-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/></svg>
      WhatsApp Confirmation
    </span>
  </div>
</section>

<!-- ── PRODUCT SECTION ── -->
<section class="product-section">
  <div class="product-image-wrap" id="product-image-wrap">
    <div class="product-placeholder">
      <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      <span>Product image</span>
    </div>
  </div>

  <div class="features-grid" id="features-grid">
    <!-- filled by JS if features param provided -->
  </div>
</section>

<!-- ── ORDER FORM ── -->
<section class="form-section" id="order">
  <div class="form-section-title">Place Your Order</div>
  <div class="form-section-sub">Fill in your details — we'll confirm via WhatsApp.</div>

  <div class="order-card">
    <form id="order-form" novalidate>

      <div class="hp">
        <input type="text" id="hp-website" tabindex="-1" autocomplete="off" />
      </div>

      <div class="row">
        <div class="field">
          <label>Full Name *</label>
          <input type="text" id="f-name" placeholder="Ahmed Benali" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>WhatsApp Number *</label>
          <input type="tel" id="f-phone" placeholder="+212600000000" required />
        </div>
        <div class="field">
          <label>City</label>
          <input type="text" id="f-city" placeholder="Casablanca" />
        </div>
      </div>

      <div class="field">
        <label>Delivery Address</label>
        <input type="text" id="f-address" placeholder="123 Rue Hassan II" />
      </div>

      <div class="field">
        <div class="items-header">
          <label>Products *</label>
          <button type="button" class="add-btn" onclick="addItem()">+ Add product</button>
        </div>
        <div id="items-list"></div>
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" rows="2" placeholder="Any special requests…"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">🛒 Place Order</button>

      <div class="result" id="result"></div>
      <div class="wa-note">You will receive a WhatsApp confirmation message shortly.</div>
    </form>
  </div>
</section>

<footer>
  <div id="footer-store"></div>
  <div style="margin-top:6px">Powered by Stoky</div>
</footer>

<script>
  // ── URL PARAMS ──────────────────────────────────────────────
  const params      = new URLSearchParams(window.location.search);
  const API_KEY     = params.get('api_key')    || '';
  const PIXEL_ID    = params.get('pixel')      || '';
  const storeName   = params.get('store')      || 'STORE';
  const productName = params.get('product')    || 'Our Product';
  const price       = params.get('price')      || '';
  const desc        = params.get('desc')       || 'High quality product. Fast delivery across Morocco.';
  const imageUrl    = params.get('image')      || '';
  const delivery    = params.get('delivery')   || '';

  // ── PAGE CONTENT ────────────────────────────────────────────
  document.title = productName + ' — ' + storeName;
  document.getElementById('page-title').textContent = productName + ' — ' + storeName;
  document.getElementById('store-badge-name').textContent = storeName.toUpperCase();
  document.getElementById('hero-title').textContent = productName;
  document.getElementById('hero-desc').textContent = desc;
  document.getElementById('footer-store').textContent = storeName.toUpperCase();

  if (price) {
    document.getElementById('price-amount').textContent = price;
    document.getElementById('price-tag').style.display = '';
    if (delivery) document.getElementById('delivery-note').textContent = '+ ' + delivery + ' MAD delivery';
  }

  if (imageUrl) {
    const wrap = document.getElementById('product-image-wrap');
    wrap.innerHTML = `<img src="${imageUrl}" alt="${productName}" onerror="this.parentElement.innerHTML='<div class=product-placeholder><span>Image not found</span></div>'" />`;
  }

  // ── FACEBOOK PIXEL ──────────────────────────────────────────
  if (PIXEL_ID) {
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
    (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', PIXEL_ID);
    fbq('track', 'PageView');

    // ViewContent when product section becomes visible
    const productSection = document.querySelector('.product-section');
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        fbq('track', 'ViewContent', {
          content_name: productName,
          content_type: 'product',
          value: price ? parseFloat(price) : undefined,
          currency: 'MAD',
        });
        observer.disconnect();
      }
    }, { threshold: 0.3 });
    observer.observe(productSection);

    // InitiateCheckout when form section becomes visible
    const formSection = document.getElementById('order');
    const formObserver = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        fbq('track', 'InitiateCheckout', {
          content_name: productName,
          value: price ? parseFloat(price) : undefined,
          currency: 'MAD',
        });
        formObserver.disconnect();
      }
    }, { threshold: 0.5 });
    formObserver.observe(formSection);
  }

  // ── ITEMS ────────────────────────────────────────────────────
  let itemCount = 0;

  function addItem(name = '', qty = 1) {
    itemCount++;
    const id = itemCount;
    const div = document.createElement('div');
    div.className = 'item-row';
    div.id = `item-${id}`;
    div.innerHTML = `
      <input type="text" placeholder="Product name" value="${name}" id="item-name-${id}" />
      <input type="number" placeholder="Qty" min="1" value="${qty}" id="item-qty-${id}" />
      <button type="button" class="remove-btn" onclick="removeItem(${id})">×</button>
    `;
    document.getElementById('items-list').appendChild(div);
  }

  function removeItem(id) {
    document.getElementById(`item-${id}`)?.remove();
  }

  function getItems() {
    return [...document.querySelectorAll('#items-list .item-row')]
      .map(row => {
        const id  = row.id.split('-')[1];
        const name = document.getElementById(`item-name-${id}`)?.value.trim();
        const qty  = parseInt(document.getElementById(`item-qty-${id}`)?.value) || 1;
        return name ? { product_name: name, quantity: qty } : null;
      })
      .filter(Boolean);
  }

  // Pre-fill product name if provided
  addItem(productName || '');

  // ── SUBMIT ───────────────────────────────────────────────────
  document.getElementById('order-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!API_KEY) {
      showResult('error', 'Missing API key. Contact the store owner.');
      return;
    }

    const name  = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const items = getItems();

    if (!name)         { showResult('error', 'Full name is required.'); return; }
    if (!phone)        { showResult('error', 'WhatsApp number is required.'); return; }
    if (!items.length) { showResult('error', 'Add at least one product.'); return; }

    const payload = {
      customer_name:    name,
      customer_phone:   phone,
      customer_city:    document.getElementById('f-city').value.trim()    || undefined,
      customer_address: document.getElementById('f-address').value.trim() || undefined,
      notes:            document.getElementById('f-notes').value.trim()   || undefined,
      items,
      website: document.getElementById('hp-website').value,
    };

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res  = await fetch(`${window.location.origin}/api/leads/inbound?api_key=${encodeURIComponent(API_KEY)}`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (res.status === 429) {
        showResult('error', data.detail);
      } else if (data.id > 0) {
        // Fire Lead pixel event on success
        if (PIXEL_ID && typeof fbq !== 'undefined') {
          fbq('track', 'Lead', {
            content_name: productName,
            value: price ? parseFloat(price) : undefined,
            currency: 'MAD',
          });
        }
        showResult('success', '✅ Order received! You will get a WhatsApp confirmation shortly.');
        document.getElementById('order-form').reset();
        document.getElementById('items-list').innerHTML = '';
        addItem(productName || '');
      } else {
        showResult('error', data.detail || 'Something went wrong. Please try again.');
      }
    } catch (err) {
      showResult('error', 'Connection error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = '🛒 Place Order';
    }
  });

  function showResult(type, msg) {
    const el = document.getElementById('result');
    el.className = `result ${type}`;
    el.textContent = msg;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>
</body>
</html>
